name: Universal Pages Orchestrator
on:
  workflow_dispatch:
    inputs:
      port_payload:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Parse Port Payload
        run: |
          echo "REPO_NAME=${{ fromJson(github.event.inputs.port_payload).entity.title }}" >> $GITHUB_ENV
          echo "RUN_ID=${{ fromJson(github.event.inputs.port_payload).run.id }}" >> $GITHUB_ENV

      # NEW STEP: Detect if the repo uses 'main' or 'master'
      - name: Discover Default Branch
        id: branch_check
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ env.REPO_NAME }})
          
          DEFAULT_BRANCH=$(echo $RESPONSE | jq -r '.default_branch')
          echo "DEFAULT_BRANCH=$DEFAULT_BRANCH" >> $GITHUB_ENV
          echo "Detected branch: $DEFAULT_BRANCH"

      - name: Enable Pages via API
        run: |
          # We use the ${{ env.DEFAULT_BRANCH }} we just discovered
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ env.REPO_NAME }}/pages \
            -d "{\"source\":{\"branch\":\"${{ env.DEFAULT_BRANCH }}\",\"path\":\"/\"}}" || echo "Already active"
          sleep 5

      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ env.REPO_NAME }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Upload & Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Update Port Entity
        if: always()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT_ENTITY
          blueprint: service
          identifier: ${{ env.REPO_NAME }}
          properties: |
            {
              "status": "Success",
              "live_url": "https://${{ github.repository_owner }}.github.io/${{ env.REPO_NAME }}/"
            }

      - name: Close Port Run
        if: always()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ env.RUN_ID }}
          status: "SUCCESS"
