name: Zero-Manual Pages Deployment
on:
  workflow_dispatch:
    inputs:
      port_payload:
        description: 'Port payload'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write      # Required for the actual deployment
      id-token: write   # Required for authentication
    # This environment block is required to prevent the 404 error
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Parse Port Payload
        id: vars
        run: |
          echo "REPO_NAME=${{ fromJson(github.event.inputs.port_payload).entity.title }}" >> $GITHUB_ENV

      - name: Enable GitHub Pages via API
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            https://api.github.com/repos/Meghana-shetty/${{ env.REPO_NAME }}/pages \
            -d '{"source":{"branch":"main","path":"/"}}' || echo "Pages already active"
          sleep 5

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: Meghana-shetty/${{ env.REPO_NAME }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # THIS IS THE CRITICAL FIX: Report back no matter what
      - name: Report Final Status to Port
        if: always() 
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(github.event.inputs.port_payload).run.id }}
          # Automatically detects if the job passed or failed
          status: "${{ job.status == 'success' && 'SUCCESS' || 'FAILURE' }}"
          link: "https://Meghana-shetty.github.io/${{ env.REPO_NAME }}/"
          logMessage: "Deployment for ${{ env.REPO_NAME }} finished with status: ${{ job.status }}! ✅"
