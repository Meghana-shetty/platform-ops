name: Zero-Manual Pages Deployment
on:
  workflow_dispatch:
    inputs:
      port_payload:
        description: 'Port payload'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Explicitly defining the environment helps GitHub know where to go
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Parse Port Payload
        id: vars
        run: |
          echo "REPO_NAME=${{ fromJson(github.event.inputs.port_payload).entity.title }}" >> $GITHUB_ENV

      # NEW STEP: Automatically detect if the branch is 'main' or 'master'
      - name: Discover Default Branch
        id: branch_check
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            https://api.github.com/repos/Meghana-shetty/${{ env.REPO_NAME }})
          
          DEFAULT_BRANCH=$(echo $RESPONSE | jq -r '.default_branch')
          echo "DEFAULT_BRANCH=$DEFAULT_BRANCH" >> $GITHUB_ENV
          echo "Detected branch: $DEFAULT_BRANCH"

      # Updated to use the dynamic ${{ env.DEFAULT_BRANCH }} variable
      - name: Enable GitHub Pages via API
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            https://api.github.com/repos/Meghana-shetty/${{ env.REPO_NAME }}/pages \
            -d "{\"source\":{\"branch\":\"${{ env.DEFAULT_BRANCH }}\",\"path\":\"/\"}}" || echo "Pages already active"
          sleep 5

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: Meghana-shetty/${{ env.REPO_NAME }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true # This is the "Master's Trick"

      - name: Report Success to Port
        if: always() 
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(github.event.inputs.port_payload).run.id }}
          status: "SUCCESS"
          link: "https://Meghana-shetty.github.io/${{ env.REPO_NAME }}/"
          logMessage: "Deployment for ${{ env.REPO_NAME }} on branch [${{ env.DEFAULT_BRANCH }}] is complete and verified live! ✅"
