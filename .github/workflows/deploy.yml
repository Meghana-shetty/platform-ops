name: Zero-Manual Pages Deployment
on:
  workflow_dispatch:
    inputs:
      port_payload:
        description: 'Port payload'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Extract variables for cleaner code
      - name: Parse Port Payload
        id: vars
        run: |
          echo "REPO_NAME=${{ fromJson(github.event.inputs.port_payload).entity.title }}" >> $GITHUB_ENV
          echo "RUN_ID=${{ fromJson(github.event.inputs.port_payload).run.id }}" >> $GITHUB_ENV

      # 2. AUTOMATICALLY ENABLE GITHUB PAGES VIA API
      # 2. AUTOMATICALLY ENABLE GITHUB PAGES VIA API
      - name: Enable GitHub Pages via API
        run: |
          # This first call checks if Pages is already enabled
          # The second call (POST) enables it if the first one fails
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Meghana-shetty/${{ env.REPO_NAME }}/pages \
            -d '{"source":{"branch":"main","path":"/"}}' || echo "Pages might already be active"
          
          # Give GitHub 5 seconds to process the infrastructure change
          sleep 5
          
      # 3. Checkout the target repo code
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: Meghana-shetty/${{ env.REPO_NAME }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      # 4. Upload and Deploy to Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 5. Final Report to Port
      - name: Report Success
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ env.RUN_ID }}
          status: "SUCCESS"
          link: "https://Meghana-shetty.github.io/${{ env.REPO_NAME }}/"
          logMessage: "Infrastructure configured and site live at https://Meghana-shetty.github.io/${{ env.REPO_NAME }}/ ✅"
