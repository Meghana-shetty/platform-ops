name: Port Deployment
on:
  workflow_dispatch:
    inputs:
      port_payload:
        description: 'Port payload'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. This step performs the actual "work"
      - name: Actual Deployment Step
        run: |
          echo "Starting deployment process..."
          echo "Target Environment: ${{ fromJson(github.event.inputs.port_payload).inputs.environment }}"
          echo "Deploying Service: ${{ fromJson(github.event.inputs.port_payload).entity.title }}"
          # You can add your Ansible or Docker commands here later!
          sleep 5

      # 2. This step tells Port "I am finished successfully!"
      - name: Report Success to Port
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(github.event.inputs.port_payload).run.id }}
          status: "SUCCESS"
          logMessage: "Deployment for ${{ fromJson(github.event.inputs.port_payload).entity.title }} finished successfully! ✅"

      # 3. This step tells Port "Something went wrong"
      - name: Report Failure to Port
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(github.event.inputs.port_payload).run.id }}
          status: "FAILURE"
          logMessage: "The deployment failed. Please check the GitHub logs. ❌"
