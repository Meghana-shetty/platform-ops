name: Buildpack Build & Deploy
on:
  workflow_dispatch:
    inputs:
      repository_full_name:
        description: 'The repo to build (e.g., username/repo-name)'
        required: true
      image_name:
        description: 'The name for the resulting image'
        required: true
      port_run_id:
        description: 'The Port Run ID for status updates'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository_full_name }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install Pack CLI
        run: |
          (curl -sSL "https://github.com/buildpacks/pack/releases/download/v0.33.2/pack-v0.33.2-linux.tgz" | tar -C /usr/local/bin/ --no-same-owner -xzv pack)

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Lowercase Variables
        id: vars
        run: |
          # This handles the "Meghana" casing once and for all
          echo "OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "IMAGE_LC=$(echo "${{ github.event.inputs.image_name }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build with Paketo
        id: build_step
        run: |
          # Use the lowercase variables from the previous step
          IMAGE_URL="ghcr.io/${{ steps.vars.outputs.OWNER_LC }}/${{ steps.vars.outputs.IMAGE_LC }}"
          
          pack build "$IMAGE_URL:latest" \
            --builder paketobuildpacks/builder:full \
            --env "BP_WEB_SERVER=nginx" \
            --clear-cache \
            --publish
          
          echo "IMAGE_PATH=$IMAGE_URL" >> $GITHUB_OUTPUT

      - name: Deploy to Render via API
        id: deploy_render
        run: |
          # Clean name for Render URL (lowercase, dashes instead of underscores)
          CLEAN_NAME=$(echo "${{ steps.vars.outputs.IMAGE_LC }}" | tr '_' '-' | tr '.' '-')
          
          SERVICE_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services?name=$CLEAN_NAME" | jq -r '.[0].id')

          if [ "$SERVICE_ID" == "null" ] || [ -z "$SERVICE_ID" ]; then
            curl -s -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{
                "type": "web_service",
                "name": "'$CLEAN_NAME'",
                "ownerId": "${{ secrets.RENDER_OWNER_ID }}",
                "serviceDetails": {
                  "env": "docker",
                  "plan": "free"
                },
                "imagePath": "${{ steps.build_step.outputs.IMAGE_PATH }}:latest"
              }'
          else
            curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
          fi
          echo "URL=https://$CLEAN_NAME.onrender.com" >> $GITHUB_OUTPUT

      - name: Update Port Entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          identifier: ${{ github.event.inputs.repository_full_name }}
          blueprint: service
          properties: |
            {
              "container_image": "${{ steps.build_step.outputs.IMAGE_PATH }}:latest",
              "live_url": "${{ steps.deploy_render.outputs.URL }}",
              "build_strategy": "Cloud Native Buildpack"
            }

      - name: Complete Port Run
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "SUCCESS"
          logMessage: "Successfully deployed to Render: ${{ steps.deploy_render.outputs.URL }}"

      - name: Report Failure
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "FAILURE"



