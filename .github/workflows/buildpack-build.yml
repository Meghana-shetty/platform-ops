name: Buildpack Build & Deploy
on:
  workflow_dispatch:
    inputs:
      repository_full_name:
        description: 'The repo to build (e.g., username/repo-name)'
        required: true
      image_name:
        description: 'The name for the resulting image'
        required: true
      port_run_id:
        description: 'The Port Run ID for status updates'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository_full_name }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install Pack CLI
        run: |
          (curl -sSL "https://github.com/buildpacks/pack/releases/download/v0.33.2/pack-v0.33.2-linux.tgz" | tar -C /usr/local/bin/ --no-same-owner -xzv pack)

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Lowercase Variables
        id: vars
        run: |
          # Fixes the "Meghana" uppercase error for the Registry
          echo "OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          # Standardizes the image name for Render and Port
          echo "IMAGE_LC=$(echo "${{ github.event.inputs.image_name }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build with Paketo
        id: build_step
        run: |
          IMAGE_URL="ghcr.io/${{ steps.vars.outputs.OWNER_LC }}/${{ steps.vars.outputs.IMAGE_LC }}"
          
          # We force 8080 so we don't have to guess if it is 3000 or 5000
          pack build "$IMAGE_URL:latest" \
            --builder paketobuildpacks/builder:full \
            --env "BP_WEB_SERVER=nginx" \
            --env "PORT=8080" \
            --clear-cache \
            --publish
          
          echo "IMAGE_PATH=$IMAGE_URL" >> $GITHUB_OUTPUT
        
      - name: Deploy to Render
        id: deploy_render
        run: |
          CLEAN_NAME="${{ steps.vars.outputs.IMAGE_LC }}"
          
          # Create the service on Render via API
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "web_service",
              "name": "'$CLEAN_NAME'",
              "ownerId": "${{ secrets.RENDER_OWNER_ID }}",
              "serviceDetails": {
                "env": "docker",
                "plan": "free",
                "envVars": [{"key": "PORT", "value": "8080"}]
              },
              "imagePath": "${{ steps.build_step.outputs.IMAGE_PATH }}:latest"
            }')
          
          # Extract the URL Render actually assigned
          FINAL_RENDER_URL=$(echo $RESPONSE | jq -r '.serviceDetails.url // "https://'$CLEAN_NAME'.onrender.com"')
          echo "FINAL_URL=$FINAL_RENDER_URL" >> $GITHUB_OUTPUT

      - name: Update Port Entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          # CRITICAL: This must match the Identifier of the service in your Port Catalog
          identifier: ${{ steps.vars.outputs.IMAGE_LC }} 
          blueprint: service
          properties: |
            {
              "live_url": "${{ steps.deploy_render.outputs.FINAL_URL }}",
              "container_image": "${{ steps.build_step.outputs.IMAGE_PATH }}:latest"
            }

      - name: Complete Port Run
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "SUCCESS"
          logMessage: "Deployed successfully! URL: ${{ steps.deploy_render.outputs.FINAL_URL }}"

      - name: Report Failure
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "FAILURE"
          logMessage: "The build or deployment failed. Check GitHub Action logs."
