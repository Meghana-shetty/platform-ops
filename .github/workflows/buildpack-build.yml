name: Buildpack Build (No Dockerfile)
on:
  workflow_dispatch:
    inputs:
      repository_full_name:
        description: 'The repo to build (e.g., username/repo-name)'
        required: true
      image_name:
        description: 'The name for the resulting image'
        required: true
      port_run_id:
        description: 'The Port Run ID for status updates'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: # Required to push to GHCR
      contents: read
      packages: write
    steps:
      - name: Debug Inputs
        run: |
          echo "Repo Name Received: ${{ github.event.inputs.repository_full_name }}"
          echo "Image Name Received: ${{ github.event.inputs.image_name }}"
          echo "Run ID Received: ${{ github.event.inputs.port_run_id }}"

      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository_full_name }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

          
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository_full_name }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install Pack CLI
        run: |
          (curl -sSL "https://github.com/buildpacks/pack/releases/download/v0.33.2/pack-v0.33.2-linux.tgz" | tar -C /usr/local/bin/ --no-same-owner -xzv pack)

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Paketo Buildpacks
        run: |
          IMAGE_URL="ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}"
          LOWER_URL=$(echo "$IMAGE_URL" | tr '[:upper:]' '[:lower:]')
          
          # We change 'base' to 'full' here
          pack build "$LOWER_URL:latest" \
            --builder paketobuildpacks/builder:full \
            --publish

      - name: Update Port Entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT  # <--- Changed from PATCH_ENTITY to UPSERT
          identifier: ${{ github.event.inputs.repository_full_name }}
          blueprint: service
          properties: |
            {
              "container_image": "ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}:latest",
              "build_strategy": "Cloud Native Buildpack"
            }


      - name: Report Failure to Port
        if: failure() # This only runs if any previous step fails
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "FAILURE"
          logMessage: "The build failed. Check GitHub Action logs for details."
          

      - name: Complete Port Run
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "SUCCESS"  # <--- THIS IS THE KEY
          logMessage: "Build complete! Image available at GHCR."
