name: Buildpack Build (No Dockerfile)
on:
  workflow_dispatch:
    inputs:
      repository_full_name:
        description: 'The repo to build (e.g., username/repo-name)'
        required: true
      image_name:
        description: 'The name for the resulting image'
        required: true
      port_run_id:
        description: 'The Port Run ID for status updates'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: # Required to push to GHCR
      contents: read
      packages: write
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository_full_name }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install Pack CLI
        uses: buildpacks/github-actions/setup-pack@v2.1.1

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Paketo Buildpacks
        run: |
          # We use lowercase to ensure GHCR doesn't reject the image name
          IMAGE_URL="ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}"
          pack build ${IMAGE_URL,,}:latest \
            --builder paketobuildpacks/builder:base \
            --publish

      - name: Update Port Entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_ENTITY
          identifier: ${{ github.event.inputs.repository_full_name }}
          blueprint: service
          properties: |
            {
              "container_image": "ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}:latest",
              "build_strategy": "Cloud Native Buildpack"
            }

      - name: Complete Port Run
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          logMessage: "Build complete! Image available at GHCR."
