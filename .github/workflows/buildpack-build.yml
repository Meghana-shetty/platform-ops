name: Buildpack Build & Deploy
on:
  workflow_dispatch:
    inputs:
      repository_full_name:
        description: 'The repo to build (e.g., username/repo-name)'
        required: true
      image_name:
        description: 'The name for the resulting image'
        required: true
      port_run_id:
        description: 'The Port Run ID for status updates'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository_full_name }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install Pack CLI
        run: |
          (curl -sSL "https://github.com/buildpacks/pack/releases/download/v0.33.2/pack-v0.33.2-linux.tgz" | tar -C /usr/local/bin/ --no-same-owner -xzv pack)

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Standardize Casing (The Meghana Fix)
        id: casing
        run: |
          # Force the owner and image name to be lowercase
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          LOWER_IMAGE=$(echo "${{ github.event.inputs.image_name }}" | tr '[:upper:]' '[:lower:]')
          
          echo "OWNER=$LOWER_OWNER" >> $GITHUB_OUTPUT
          echo "IMAGE=$LOWER_IMAGE" >> $GITHUB_OUTPUT
          echo "FULL_IMAGE_URL=ghcr.io/$LOWER_OWNER/$LOWER_IMAGE" >> $GITHUB_OUTPUT

      - name: Build with Paketo
        run: |
          # Use the lowercase variables from the previous step
          pack build "${{ steps.casing.outputs.FULL_IMAGE_URL }}:latest" \
            --builder paketobuildpacks/builder:full \
            --env "BP_WEB_SERVER=nginx" \
            --env "BP_WEB_SERVER_ROOT=public" \
            --env "PORT=8080" \
            --publish



      - name: Smart Deploy to Render (Create or Update)
        id: deploy_render
        run: |
          CLEAN_NAME="${{ steps.casing.outputs.IMAGE }}"
          
          # 1. Check if a service with this name already exists
          # We search for the service ID using the name
          SERVICE_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services?name=$CLEAN_NAME" | jq -r '.[0].id')

          if [ "$SERVICE_ID" == "null" ] || [ -z "$SERVICE_ID" ]; then
            echo "Service not found. Creating a NEW service..."
            
            # 2. CREATE (POST) if it doesn't exist
            RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{
                "type": "web_service",
                "name": "'$CLEAN_NAME'",
                "ownerId": "${{ secrets.RENDER_OWNER_ID }}",
                "serviceDetails": {
                  "env": "docker",
                  "plan": "free",
                  "envVars": [{"key": "PORT", "value": "8080"}]
                },
                "imagePath": "${{ steps.casing.outputs.FULL_IMAGE_URL }}:latest"
              }')
            
            # Extract the URL from the create response
            FINAL_URL=$(echo $RESPONSE | jq -r '.serviceDetails.url // "https://'$CLEAN_NAME'.onrender.com"')
          else
            echo "Service exists with ID: $SERVICE_ID. Triggering an UPDATE..."
            
            # 3. UPDATE (PATCH) if it exists
            # We update the image path to the latest build and trigger a redeploy
            curl -s -X PATCH "https://api.render.com/v1/services/$SERVICE_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{
                "imagePath": "${{ steps.casing.outputs.FULL_IMAGE_URL }}:latest"
              }'
            
            # Trigger the actual deployment of that new image
            curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
            
            FINAL_URL="https://$CLEAN_NAME.onrender.com"
          fi

          echo "URL=$FINAL_URL" >> $GITHUB_OUTPUT

          

      - name: Update Port Entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          # IMPORTANT: This matches the ID of the entity in Port
          identifier: ${{ github.event.inputs.repository_full_name }}
          blueprint: service
          properties: |
            {
              "container_image": "${{ steps.casing.outputs.FULL_IMAGE_URL }}:latest",
              "live_url": "${{ steps.deploy_render.outputs.URL }}",
              "build_strategy": "Cloud Native Buildpack"
            }

      - name: Complete Port Run
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "SUCCESS"
          logMessage: "Build complete! Deployed to: ${{ steps.deploy_render.outputs.URL }}"

      - name: Report Failure
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "FAILURE"




