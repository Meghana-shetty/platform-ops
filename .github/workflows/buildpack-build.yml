name: Buildpack Build & Deploy
on:
  workflow_dispatch:
    inputs:
      repository_full_name:
        description: 'The repo to build (e.g., username/repo-name)'
        required: true
      image_name:
        description: 'The name for the resulting image'
        required: true
      port_run_id:
        description: 'The Port Run ID for status updates'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository_full_name }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install Pack CLI
        run: |
          (curl -sSL "https://github.com/buildpacks/pack/releases/download/v0.33.2/pack-v0.33.2-linux.tgz" | tar -C /usr/local/bin/ --no-same-owner -xzv pack)

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Standardize Casing (The Meghana Fix)
        id: casing
        run: |
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          LOWER_IMAGE=$(echo "${{ github.event.inputs.image_name }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$LOWER_OWNER" >> $GITHUB_OUTPUT
          echo "IMAGE=$LOWER_IMAGE" >> $GITHUB_OUTPUT
          echo "FULL_IMAGE_URL=ghcr.io/$LOWER_OWNER/$LOWER_IMAGE" >> $GITHUB_OUTPUT

      - name: Build with Paketo
        run: |
          pack build "${{ steps.casing.outputs.FULL_IMAGE_URL }}:latest" \
            --builder paketobuildpacks/builder:full \
            --env "BP_WEB_SERVER=nginx" \
            --env "BP_WEB_SERVER_ROOT=public" \
            --env "PORT=8080" \
            --publish



      - name: Smart Deploy to Render
        id: deploy_render
        run: |
          CLEAN_NAME="${{ steps.casing.outputs.IMAGE }}"
          
          # 1. CREATE SERVICE (Ensuring ownerId is exactly where Render wants it)
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "ownerId": "${{ secrets.RENDER_OWNER_ID }}",
              "type": "web_service",
              "name": "'$CLEAN_NAME'",
              "repo": "", 
              "autoDeploy": "no",
              "serviceDetails": {
                "env": "docker",
                "plan": "free"
              },
              "imagePath": "${{ steps.casing.outputs.FULL_IMAGE_URL }}:latest"
            }')
          
          echo "RENDER_RESPONSE: $RESPONSE"
          
          FINAL_URL=$(echo $RESPONSE | jq -r '.serviceDetails.url // empty')
          
          if [ -z "$FINAL_URL" ] || [ "$FINAL_URL" == "null" ]; then
             FINAL_URL="https://$CLEAN_NAME.onrender.com"
          fi

          echo "FINAL_URL=$FINAL_URL" >> $GITHUB_OUTPUT

          

      - name: Update Port Entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          # Change this to match your Port Catalog (either IMAGE_LC or FULL_REPO)
          identifier: ${{ steps.casing.outputs.IMAGE }}
          blueprint: service
          properties: |
            {
              "live_url": "${{ steps.deploy_render.outputs.FINAL_URL }}",
              "container_image": "${{ steps.casing.outputs.FULL_IMAGE_URL }}:latest",
              "build_strategy": "Cloud Native Buildpack"
            }

      - name: Complete Port Run
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          status: "SUCCESS"
          logMessage: "Successfully deployed to Render: ${{ steps.deploy_render.outputs.FINAL_URL }}"





